# Example: attach a fresh REPO_BRIEF.md to every pull request.
# Copy this file into .github/workflows/ in the repo you want to brief.
name: RepoBrief

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate brief
        env:
          # Uses the built-in token for higher GitHub API limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx @repobrief/cli inspect . --mode deep > REPO_BRIEF.md

      - name: Comment the brief on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('REPO_BRIEF.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
